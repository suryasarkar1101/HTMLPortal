<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Selenium Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="themes/black.css" id="theme-style">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="container">
    <div class="side-menu-container">
      <!-- Sidebar Toggle Buttons -->
      <div id="sidebar" class="sidebar collapsed">
        <div class="menu-title">
          <i id="toggleBtn" class="fa-solid fa-bars"></i>
        </div>
        <div class="full-menu">
          <div class="menu-item" data-page="index.html">
            <i class="fa-solid fa-chart-column"></i>
            <span class="menu-text">Dashboard</span>
          </div>

          <div class="menu-item menu-selected" data-page="testcases.html">
            <i class="fa-solid fa-list-check"></i>
            <span class="menu-text">Test Cases</span>
          </div>
        </div>

        <div class="bottom">
          <div class="theme-switcher">
            <button class="theme-btn active" data-theme="black"><span class="theme-dot black-dot"></span></button>
            <button class="theme-btn" data-theme="blue"><span class="theme-dot blue-dot"></span></button>
            <button class="theme-btn" data-theme="white"><span class="theme-dot white-dot"></span></button>
          </div>
          <div class="menu-version">v <span>1.0</span></div>
        </div>

      </div>
    </div>

    <div class="body-container">
      <!-- Header -->
      <header class="header">
        <div>
          <div class="report-title">Custom Selenium Test Report</div>
          <span class="sub-title">Test Execution Results</span>
        </div>
        <div class="header-right">
          <div class="time-details">
            <div class="single-details">Date : <span>Apr 3, 2026 10:35 AM</span></div>
            <div class="single-details">Job Duration : <span>12m 34s</span></div>
            <div class="single-details">Job Number : <span>53</span></div>
          </div>
        </div>
      </header>

      <!-- Summary Cards -->

      <div id="cards-container" class="cards"></div>

      <!-- Charts Section -->
     

      <!-- Table -->
      <div class="table-section">
        <div class="tabledata-header">
          <div class="tabledata-title"><i class="fa-solid fa-microscope"></i> Test Results</div>
          <div class="tabledata-actions">
            <div class="tabledata-search-box">
              <input type="text" id="searchInput" placeholder="Search tests..." oninput="filterTable()">
              <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <select id="statusFilter" onchange="filterTable()">
              <option value="all">All Status</option>
              <option value="passed">Passed</option>
              <option value="failed">Failed</option>
              <option value="skipped">Skipped</option>
            </select>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Test Name</th>
              <th>Test Description</th>
              <th>Status</th>
              <th>Duration</th>
            </tr>
          </thead>
          <tbody id="testTableBody"></tbody>
        </table>
      </div>

    </div>
  </div>
  <script src="app.js"></script>
  <script src="Chart.js"></script>
</body>

</html>
