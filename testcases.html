<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Selenium Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/themes/black.css" id="theme-style">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script>
    if (localStorage.getItem('selectedTheme') && ['black', 'blue', 'white'].includes(localStorage.getItem('selectedTheme'))) {
      document.getElementById('theme-style').href = 'assets/css/themes/' + localStorage.getItem('selectedTheme') + '.css';
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="container">
    <div class="side-menu-container">
      <!-- Sidebar Toggle Buttons -->
      <div id="sidebar" class="sidebar collapsed">
        <div class="menu-title">
          <i id="toggleBtn" class="fa-solid fa-bars"></i>
        </div>
        <div class="full-menu">
          <div class="menu-item" data-page="index.html">
            <i class="fa-solid fa-chart-column"></i>
            <span class="menu-text">Dashboard</span>
          </div>

          <div class="menu-item menu-selected" data-page="testcases.html">
            <i class="fa-solid fa-list-check"></i>
            <span class="menu-text">Test Cases</span>
          </div>
        </div>

        <div class="bottom">
          <div class="theme-switcher">
            <button class="theme-btn active" data-theme="black"><span class="theme-dot black-dot"></span></button>
            <button class="theme-btn" data-theme="blue"><span class="theme-dot blue-dot"></span></button>
            <button class="theme-btn" data-theme="white"><span class="theme-dot white-dot"></span></button>
          </div>
          <div class="menu-version">v <span>1.0</span></div>
        </div>

      </div>
    </div>

    <div class="body-container">
      <!-- Header -->
      <header class="header">
        <div>
          <div class="report-title">Custom Selenium Test Report</div>
          <span class="sub-title">Test Execution Results of </span>
        </div>
        <div class="header-right">
          <div class="time-details">
            <div class="single-details">Date : <span>Apr 3, 2026 10:35 AM</span></div>
            <div class="single-details">Job Duration : <span>12m 34s</span></div>
            <div class="single-details">Job Number : <span>53</span></div>
          </div>
        </div>
      </header>

      <!-- Summary Cards -->

      <div id="cards-container" class="cards"></div>

      <!-- Charts Section -->

      <div class="main-content">

        <!-- Table -->
        <div class="left-table-section">
          <div class="tabledata-header">
            <div class="tabledata-title"><i class="fa-solid fa-flask-vial"></i> <span id="testSuiteName">Results
                of</span>
            </div>
            <div class="tabledata-actions">
              <div class="tabledata-search-box">
                <input type="text" id="searchInput" placeholder="Search tests..."
                  oninput="filterTable('testTableBody', 4, true)">
                <i class="fa-solid fa-magnifying-glass"></i>
              </div>
              <select id="statusFilter" onchange="filterTable('testTableBody', 4, true)">
                <option value="all">All Status</option>
                <option value="passed">Passed</option>
                <option value="failed">Failed</option>
                <option value="non_verifying">Non-Verifying</option>
                <option value="skipped">Skipped</option>
              </select>
            </div>
          </div>

          <table class="testcase-table">
            <thead>
              <tr>
                <th>Script No.</th>
                <th>Test Description</th>
                <th>Status</th>
                <th>Duration</th>
              </tr>
            </thead>
            <tbody id="testTableBody"></tbody>
          </table>
        </div>

        <!-- RIGHT: DETAILS PANEL -->
        <div class="side-panel">
          <div class="side-panel-action">
            <i class="fa-solid fa-up-right-from-square"></i>
          </div>
          <div class="side-panel-content">
            <div id="emptyState" class="empty-state">
              <i class="fa-solid fa-circle-info"></i>
              <p>No test is selected</p>
            </div>
            <div id="detailContent" style="display:none;">
              <!-- Summary -->
              <div class="test-summary">
                <div class="description-box">
                  <div class="summary-id" id="testID"></div>
                  <span class="summary-description" id="testDescrition"></span>
                </div>
                <div class="summary-box-cont">
                  <div class="summary-box" id="sumSteps">
                    <div class="summary-box-row">
                      <span class="summary-box-title"><i class="fa-solid fa-stopwatch"></i>Duration</span>
                      <span class="summary-box-value" id="testDuration">3s</span>
                    </div>

                    <div class="summary-box-row">
                      <span class="summary-box-title"><i class="fa-solid fa-list-ul"></i>Total Steps</span>
                      <span class="summary-box-value" id="testTotalsteps">5</span>
                    </div>

                    <div class="summary-box-row">
                      <span class="summary-box-title"><i class="fa-solid fa-clipboard-question"></i>Status</span>
                      <span class="summary-box-value" id="testStatus">Failed</span>
                    </div>

                  </div>
                  <div class="summary-box">
                    <div class="summary-box-row">
                      <span class="summary-box-title"><i class="fa-solid fa-bug-slash"></i>Bug Ref ID</span>
                      <span class="summary-box-value" id="testBug">BUG-1023</span>
                    </div>
                    <div class="summary-box-row no-flex">
                      <div class="summary-title">Comments</div>
                      <span id="testComment"></span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Steps -->
              <div id="stepsContainer" class="steps-container"></div>

            </div>
          </div>
        </div>




      </div>
    </div>
    <script src="assets/js/app.js"></script>

</body>

</html>
